<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>Your Project Name | Short Keyword-Rich Description</title>
  <meta name="description" content="Concise, keyword-optimized description of your Lovable project for search engines." />
  <meta name="keywords" content="keyword1, keyword2, keyword3" />
  <meta name="author" content="Your Name or Company" />
  <link rel="canonical" href="https://yourdomain.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yourdomain.com/" />
  <meta property="og:title" content="Your Project Name" />
  <meta property="og:description" content="Concise, keyword-optimized description of your Lovable project." />
  <meta property="og:image" content="https://yourdomain.com/og-image.jpg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://yourdomain.com/" />
  <meta name="twitter:title" content="Your Project Name" />
  <meta name="twitter:description" content="Concise, keyword-optimized description of your Lovable project." />
  <meta name="twitter:image" content="https://yourdomain.com/og-image.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />

  <style>
    /* Reset & ensure iframe looks native */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    .iframe-wrapper {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>

  <!-- Optional: Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Your Project Name",
    "url": "https://yourdomain.com/",
    "description": "Concise, keyword-optimized description of your Lovable project."
  }
  </script>
</head>
<body>
  <div class="iframe-wrapper">
    <iframe
      src="https://skatterihimlen.lovable.app"
      title="Skatter i himlen"
      loading="eager"
      allow="clipboard-read; clipboard-write; fullscreen"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </div>
</body>
</html>
